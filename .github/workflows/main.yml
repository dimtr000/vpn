name: Build Flet APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Flet
      run: |
        python -m pip install --upgrade pip
        pip install flet

    - name: Build APK
      run: |
        # Просто собираем проект, который лежит в корне
        flet build apk main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vpn-app
        path: build/apk/*.apk
