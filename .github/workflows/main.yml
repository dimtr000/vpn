name: Build Flet APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fletdev/flet:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build APK
      run: |
        # Прямая сборка внутри преднастроенного контейнера
        flet build apk main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vpn-app
        path: build/apk/*.apk
