name: Build Flet APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout SDK
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Flet Compiler
      run: |
        python -m pip install --upgrade pip
        pip install flet

    - name: Build Android APK
      run: |
        flet build apk main.py --no-config

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: premium-vpn-app
        path: build/apk/*.apk
